version: '3.8'

services:
  
  db:
    image: mysql:8.0
    container_name: juego-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: juegodb

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  
  juegazo-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: juego-2d-container
    
    depends_on:
      db:
        condition: service_healthy
    
      resources:
        limits:
          cpus: '0.5'
          memory: 512M